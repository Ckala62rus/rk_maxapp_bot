root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -gcflags=\"all=-N -l\" -o ./tmp/server ./cmd/server"
  bin = "tmp/server"
  full_bin = "dlv exec ./tmp/server --headless --listen=:40000 --api-version=2 --accept-multiclient --"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", ".git", "node_modules"]
  delay = 1000
  poll = true
  poll_interval = 1000

[log]
  time = true

[misc]
  clean_on_exit = true
