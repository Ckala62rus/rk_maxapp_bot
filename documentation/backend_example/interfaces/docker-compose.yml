services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interfaces-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      CONFIG_PATH: /app/config.yml
      APP_NAME: interfaces
      APP_VERSION: 0.1.0
      ENV: production
      ENABLE_TRACING: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4318"
      ENABLE_PROFILING: "true"
      PYROSCOPE_URL: "http://pyroscope:4040"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - appnet
    logging:
      driver: loki
      options:
        # On Docker Desktop (Windows/Mac) Loki is reachable via host.docker.internal.
        # Override via LOKI_URL in .env if needed.
        loki-url: "${LOKI_URL:-http://host.docker.internal:3100/loki/api/v1/push}"
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                app_name: app_name
                app_version: app_version
          - labels:
              level:
              app_name:
              app_version:

  postgres:
    image: postgres:16-alpine
    container_name: interfaces-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  migrate:
    image: migrate/migrate:v1.7.0
    container_name: interfaces-migrate
    profiles:
      - tools
    volumes:
      - ./migrations:/migrations:ro
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-db}?sslmode=disable
    networks:
      - appnet

  redis:
    image: redis:7-alpine
    container_name: interfaces-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - appnet

  minio:
    image: quay.io/minio/minio:latest
    container_name: interfaces-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://localhost:9000}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  nginx:
    image: nginx:1.27-alpine
    container_name: interfaces-minio-nginx
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "9000:9000" # S3 API and presigned URLs
      - "9001:9001" # MinIO Console
    volumes:
      - ./docker/minio/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - appnet

  loki:
    image: grafana/loki:3.4.1
    container_name: interfaces-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - appnet

  grafana:
    image: grafana/grafana:11.0.0
    container_name: interfaces-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL: grafana-pyroscope-datasource
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - loki
      - tempo
      - pyroscope
    networks:
      - appnet

  pyroscope:
    image: grafana/pyroscope:1.18.1
    container_name: interfaces-pyroscope
    ports:
      - "4040:4040"
    networks:
      - appnet

  tempo:
    image: grafana/tempo:2.9.1
    container_name: interfaces-tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    command:
      - "-config.file=/etc/tempo/tempo.yml"
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    networks:
      - appnet

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: interfaces-otel-collector
    ports:
      - "4317:4317"
      - "4318:4318"
    command:
      - "--config=/etc/otel-collector.yml"
    volumes:
      - ./docker/otel-collector/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      - tempo
    networks:
      - appnet

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: interfaces-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - app
    networks:
      - appnet

volumes:
  postgres_data:
  minio_data:

networks:
  appnet:
    driver: bridge
