services:
  backend-dev-live:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.live
    container_name: maxapp-backend-dev
    ports:
      - "3000:3000"
      - "40000:40000"
    environment:
      CONFIG_PATH: /app/docker/config.app.yml
      APP_NAME: maxapp
      APP_VERSION: 0.1.0
      ENV: development
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      BOT_TOKEN: ${BOT_TOKEN}
      ENABLE_INITDATA_MOCK: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_SSLMODE: disable
      DAX_MSSQL_HOST: ${DAX_MSSQL_HOST}
      DAX_MSSQL_PORT: ${DAX_MSSQL_PORT:-1433}
      DAX_MSSQL_USER: ${DAX_MSSQL_USER}
      DAX_MSSQL_PASSWORD: ${DAX_MSSQL_PASSWORD}
      DAX_MSSQL_DB: ${DAX_MSSQL_DB}
      DAX_MSSQL_ENCRYPT: ${DAX_MSSQL_ENCRYPT:-disable}
      ENABLE_TRACING: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4318"
      ENABLE_PROFILING: "true"
      PYROSCOPE_URL: "http://pyroscope:4040"
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - appnet
    logging:
      driver: loki
      options:
        loki-url: "${LOKI_URL:-http://host.docker.internal:3100/loki/api/v1/push}"
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                app_name: app_name
                app_version: app_version
          - labels:
              level:
              app_name:
              app_version:

  frontend:
    image: node:20.18-alpine
    container_name: maxapp-frontend-dev
    working_dir: /app
    environment:
      __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS: ".tuna.am,.ru.tuna.am"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - appnet

  web-dev:
    image: nginx:1.27-alpine
    container_name: maxapp-web-dev
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend-dev-live
    networks:
      - appnet

  # Static build for MAX WebView (no Vite/HMR).
  web-tunnel:
    image: nginx:1.27-alpine
    container_name: maxapp-web-tunnel
    ports:
      - "8081:80"
    volumes:
      - ./deploy/nginx/nginx.tunnel.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend-dev-live
    networks:
      - appnet

  postgres:
    image: postgres:16-alpine
    container_name: maxapp-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: maxapp-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data_dev:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - appnet

  migrate:
    image: migrate/migrate:v4.19.1
    container_name: maxapp-migrate-dev
    profiles:
      - tools
    volumes:
      - ./backend/migrations:/migrations:ro
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-app}?sslmode=disable
    networks:
      - appnet

  loki:
    image: grafana/loki:3.4.1
    container_name: maxapp-loki-dev
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - appnet

  grafana:
    image: grafana/grafana:11.0.0
    container_name: maxapp-grafana-dev
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL: grafana-pyroscope-datasource
    volumes:
      - ./deploy/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - loki
      - tempo
      - pyroscope
    networks:
      - appnet

  pyroscope:
    image: grafana/pyroscope:1.18.1
    container_name: maxapp-pyroscope-dev
    ports:
      - "4040:4040"
    networks:
      - appnet

  tempo:
    image: grafana/tempo:2.9.1
    container_name: maxapp-tempo-dev
    ports:
      - "3200:3200"
    command:
      - "-config.file=/etc/tempo/tempo.yml"
    volumes:
      - ./deploy/observability/tempo.yml:/etc/tempo/tempo.yml:ro
    networks:
      - appnet

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: maxapp-otel-collector-dev
    ports:
      - "14317:4317"
      - "14318:4318"
    command:
      - "--config=/etc/otel-collector.yml"
    volumes:
      - ./deploy/observability/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      - tempo
    networks:
      - appnet

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: maxapp-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/observability/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - backend-dev-live
    networks:
      - appnet

volumes:
  postgres_data_dev:
  pgadmin_data_dev:
  go_mod_cache:
  go_build_cache:
  frontend_node_modules:

networks:
  appnet:
    driver: bridge
