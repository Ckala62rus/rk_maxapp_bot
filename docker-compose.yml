services:
  backend:
    build:
      context: ./backend
    container_name: maxapp-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      CONFIG_PATH: /app/config.yml
      APP_NAME: maxapp
      APP_VERSION: 0.1.0
      ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BOT_TOKEN: ${BOT_TOKEN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_SSLMODE: disable
      DAX_MSSQL_HOST: ${DAX_MSSQL_HOST}
      DAX_MSSQL_PORT: ${DAX_MSSQL_PORT:-1433}
      DAX_MSSQL_USER: ${DAX_MSSQL_USER}
      DAX_MSSQL_PASSWORD: ${DAX_MSSQL_PASSWORD}
      DAX_MSSQL_DB: ${DAX_MSSQL_DB}
      DAX_MSSQL_ENCRYPT: ${DAX_MSSQL_ENCRYPT:-disable}
      ENABLE_TRACING: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4318"
      ENABLE_PROFILING: "true"
      PYROSCOPE_URL: "http://pyroscope:4040"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - appnet
    logging:
      driver: loki
      options:
        # Use service name `loki` on Linux prod (host.docker.internal is often missing there).
        loki-url: "${LOKI_URL:-http://loki:3100/loki/api/v1/push}"
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                app_name: app_name
                app_version: app_version
          - labels:
              level:
              app_name:
              app_version:

  web:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    container_name: maxapp-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Used by /entrypoint.sh to resolve default Let’s Encrypt paths.
      CERT_DOMAIN: ${CERT_DOMAIN}
      # Optional: if you mount certificates from another location, set these explicitly.
      # SSL_CERT_PATH: ${SSL_CERT_PATH}
      # SSL_KEY_PATH: ${SSL_KEY_PATH}
    volumes:
      # ACME challenge files (webroot mode).
      - /var/www/certbot:/var/www/certbot:ro
      # Let’s Encrypt storage (default certificate paths).
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - appnet

  postgres:
    image: postgres:16-alpine
    container_name: maxapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # Must match POSTGRES_USER (default image user is not always `postgres`).
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: maxapp-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - appnet

  migrate:
    image: migrate/migrate:v4.19.1
    container_name: maxapp-migrate
    profiles:
      - tools
    volumes:
      - ./backend/migrations:/migrations:ro
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-app}?sslmode=disable
    networks:
      - appnet

  loki:
    image: grafana/loki:3.4.1
    container_name: maxapp-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - appnet

  grafana:
    image: grafana/grafana:11.0.0
    container_name: maxapp-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL: grafana-pyroscope-datasource
    volumes:
      - ./deploy/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - loki
      - tempo
      - pyroscope
    networks:
      - appnet

  pyroscope:
    image: grafana/pyroscope:1.18.1
    container_name: maxapp-pyroscope
    ports:
      - "4040:4040"
    networks:
      - appnet

  tempo:
    image: grafana/tempo:2.9.1
    container_name: maxapp-tempo
    ports:
      - "3200:3200"
    command:
      - "-config.file=/etc/tempo/tempo.yml"
    volumes:
      - ./deploy/observability/tempo.yml:/etc/tempo/tempo.yml:ro
    networks:
      - appnet

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: maxapp-otel-collector
    ports:
      - "14317:4317"
      - "14318:4318"
    command:
      - "--config=/etc/otel-collector.yml"
    volumes:
      - ./deploy/observability/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      - tempo
    networks:
      - appnet

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: maxapp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - backend
    networks:
      - appnet

volumes:
  postgres_data:
  pgadmin_data:

networks:
  appnet:
    driver: bridge
