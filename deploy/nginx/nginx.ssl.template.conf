#
# SSL-enabled nginx template.
# Runtime script (see entrypoint.sh) generates /etc/nginx/conf.d/default.conf
# from this template once certificate files exist.
#

server {
    listen 80;
    server_name _;

    # ACME challenge endpoint for certbot (webroot mode).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Redirect everything else to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate ${SSL_CERT_PATH};
    ssl_certificate_key ${SSL_KEY_PATH};

    # Basic SSL defaults (can be extended).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Proxy API to backend service.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow long-running DAX queries.
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        # Return JSON for upstream errors/timeouts.
        proxy_intercept_errors on;
        error_page 502 503 = @api_50x;
        error_page 504 = @api_504;
    }

    location @api_50x {
        default_type application/json;
        return 502 '{"success":false,"message":"upstream error","data":[],"rows":0}';
    }

    location @api_504 {
        default_type application/json;
        return 504 '{"success":false,"message":"upstream timeout","data":[],"rows":0}';
    }

    # SPA fallback.
    location / {
        try_files $uri /index.html;
    }
}

