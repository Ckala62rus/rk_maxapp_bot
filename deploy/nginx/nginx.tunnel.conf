server {
    listen 80;
    server_name _;

    # Serve built frontend files (no Vite/HMR).
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API to dev backend (live).
    location /api/ {
        proxy_pass http://backend-dev-live:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow long-running DAX queries.
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        # Return JSON for upstream errors/timeouts.
        proxy_intercept_errors on;
        error_page 502 503 = @api_50x;
        error_page 504 = @api_504;
    }

    location @api_50x {
        default_type application/json;
        return 502 '{"success":false,"message":"upstream error","data":[],"rows":0}';
    }

    location @api_504 {
        default_type application/json;
        return 504 '{"success":false,"message":"upstream timeout","data":[],"rows":0}';
    }

    # SPA fallback to index.html.
    location / {
        try_files $uri /index.html;
    }
}
