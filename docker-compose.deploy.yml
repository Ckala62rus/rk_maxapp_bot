services:
  backend:
    image: maxapp-backend:prod
    container_name: maxapp-backend
    restart: unless-stopped
    environment:
      CONFIG_PATH: /app/config.yml
      ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BOT_TOKEN: ${BOT_TOKEN}

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_SSLMODE: disable

      DAX_MSSQL_HOST: ${DAX_MSSQL_HOST}
      DAX_MSSQL_PORT: ${DAX_MSSQL_PORT:-1433}
      DAX_MSSQL_USER: ${DAX_MSSQL_USER}
      DAX_MSSQL_PASSWORD: ${DAX_MSSQL_PASSWORD}
      DAX_MSSQL_DB: ${DAX_MSSQL_DB}
      DAX_MSSQL_ENCRYPT: ${DAX_MSSQL_ENCRYPT:-disable}
    networks:
      - appnet
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "${LOKI_URL:-http://loki:3100/loki/api/v1/push}"

  web:
    image: maxapp-web:prod
    container_name: maxapp-web
    restart: unless-stopped
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    environment:
      # Used by /entrypoint.sh to resolve default Let’s Encrypt paths.
      CERT_DOMAIN: ${CERT_DOMAIN}
      # Optional: if you mount certificates from another location, set these explicitly.
      # SSL_CERT_PATH: ${SSL_CERT_PATH}
      # SSL_KEY_PATH: ${SSL_KEY_PATH}
    volumes:
      # ACME challenge files (webroot mode).
      - /var/www/certbot:/var/www/certbot:ro
      # Let’s Encrypt storage (default certificate paths).
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - appnet
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: maxapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: maxapp-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - appnet
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Run manually: `docker compose -f docker-compose.deploy.yml run --rm migrate`
  migrate:
    image: maxapp-migrate:prod
    container_name: maxapp-migrate
    networks:
      - appnet
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-app}?sslmode=disable",
        "up"
      ]

volumes:
  postgres_data:
  pgadmin_data:

networks:
  appnet:
    driver: bridge

